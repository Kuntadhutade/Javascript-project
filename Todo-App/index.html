<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="todo-app">
            <header class="todo-header">
                <h1>My Todo List</h1>
                <p>stay organized and productive</p>
            </header>


            <div class="todo-input-container">
                <input 
                type="text" 
                class="todo-input" 
                id="TodoInput"
                placeholder="Add a new task...">

                <button class="TodoBtn" id="AddTodoBtn">Add</button>
            </div>

            <div class="filter-container">
                <button class="filter-btn active">All</button>
                <button class="filter-btn">Active</button>
                <button class="filter-btn">Completed</button>
            </div>

            <div class="checkbox-container">
               <ul class="todoList" id="todoList">
                <li class="todo-item">
                    <input type="checkbox" class="todo-checkbox">
                    <span class="todo-text">complete project documentation</span>
                    <button class="delete-btn">&times;</button>
                </li>
               </ul>


               <ul class="todo-list">
                <li class="todo-item">
                    <input type="checkbox" class="todo-checkbox" checked>
                    <span class="todo-text">Review pull request</span>
                     <button class="delete-btn">&times;</button>
                </li>
               </ul>


               <ul class="todo-list">
                <li class="todo-item">
                    <input type="checkbox" class="todo-checkbox">
                    <span class="todo-text">Update team on progress</span>
                      <button class="delete-btn">&times;</button>
                      
                </li>
               </ul>
            </div>
            <div class="todo-footer">
                <span id="items-left"><span id="remaining-count">0</span>items left</span>
                <button id="ClearCompleted" class="clear-completed">clear completed</button>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
